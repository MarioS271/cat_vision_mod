modLoader = "javafml"
loaderVersion = "[49,)"
license = "AGPLv3 License"
issueTrackerURL = "https://github.com/MarioS271/cat_vision_mod/issues"

[[mods]]
    modId = "cat_vision"
    version = "${file.jarVersion}"
    displayName = "CatVision"
    description = "Toggleable night vision and visual-effect immunity. Client-side only."
    logoFile = "assets/cat_vision/icon.png"

# side = "CLIENT" on every dependency entry prevents loading on a dedicated server.
[[dependencies.cat_vision]]
    modId = "forge"
    mandatory = true
    versionRange = "[49,)"
    ordering = "NONE"
    side = "CLIENT"

[[dependencies.cat_vision]]
    modId = "minecraft"
    mandatory = true
    versionRange = "[1.20.4,1.21)"
    ordering = "NONE"
    side = "CLIENT"
